flutter_native_splash:
  color: "#000000"  # Black background
  image: assets/images/logoo.png # Path to your splash screen image
  android: true  # Enable splash screen for Android
  ios: true  # Enable splash screen for iOS
  fullscreen: true  # Use full-screen splash

  android_12:
    color: "#000000"  # Black background
    image: assets/images/logoo.png # Path to your splash screen image
    android: true  # Enable splash screen for Android
    ios: true  # Enable splash screen for iOS
    fullscreen: true  # Use full-screen splash

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logoo.png"
  min_sdk_android: 21
  remove_alpha_ios: true